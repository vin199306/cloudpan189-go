name: Release

on:
  push:
    branches: [ master, main ]

jobs: 
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        
    - name: Code Checks
      run: |
        # 运行 golangci-lint
        golangci-lint run --timeout=5m --disable=errcheck,staticcheck,ineffassign,unused
        
        # 运行 Gosec 安全扫描器
        gosec -no-fail -fmt sarif -out results.sarif ./...
        
    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.sarif    
        
    - name: Get version
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        if [ -z "$VERSION" ]; then
          VERSION=$(date +"v%Y%m%d-%H%M%S")
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
      
    - name: Build and Package Binaries
      env:
        VERSION: ${{ steps.get_version.outputs.VERSION }}
      run: |
        mkdir -p builds
        TARGETS=("linux/amd64" "linux/mipsle" "windows/amd64")
        for target in "${TARGETS[@]}"; do
          GOOS=${target%/*}
          GOARCH=${target#*/}
          OUTPUT_NAME="cloudpan189-go"
          if [ "$GOOS" = "windows" ]; then
            OUTPUT_NAME+=".exe"
          fi
          CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -a -ldflags '-extldflags "-static" -checklinkname=0' -o builds/${OUTPUT_NAME} .
          ARCHIVE_NAME="cloudpan189-go-${VERSION}-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            cd builds && zip -r ${ARCHIVE_NAME}.zip ${OUTPUT_NAME} && cd ..
          else
            cd builds && tar -czf ${ARCHIVE_NAME}.tar.gz ${OUTPUT_NAME} && cd ..
          fi
          rm builds/${OUTPUT_NAME}
        done
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        name: CloudPan189-Go ${{ steps.get_version.outputs.VERSION }}
        files: builds/*
        draft: false
        prerelease: false
        make_latest: true

    - name: SFTP Upload
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        username: admin
        password: ${{ secrets.SFTP_PASSWORD }}
        host: rclone.yanwen.cloud
        port: 22  # 默认SFTP端口，可根据实际情况修改
        local_path: builds/*  # 本地文件路径
        remote_path: /root  # 远程服务器目标路径，根据实际需求修改
        sftp_only: true  # 仅使用SFTP协议